<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Carrom Football Pro — The Ultimate Sports Physics Game</title>
  
  <style>
    :root {
      --color-bg: #fff5f2;
      --color-board: #166534;
      --color-board-dark: #14532d;
      --color-blue: #3b82f6;
      --color-red: #ef4444;
      --color-text: #1e293b;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
    
    body { 
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: 20px 0;
      overscroll-behavior: none;
    }

    #app-container {
      width: 100%; max-width: 1000px; padding: 0 15px; display: flex; flex-direction: column; align-items: center;
    }

    #header {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }

    .pill-score {
      display: flex; align-items: center; background: #fff; border: 4px solid #1e293b;
      border-radius: 50px; overflow: hidden; box-shadow: 0 6px 0 #1e293b;
    }

    .pill-label { background: #1e293b; color: #fff; padding: 10px 16px; font-weight: 800; font-size: 16px; letter-spacing: 1px; }
    .pill-value { padding: 10px 24px; font-weight: 900; font-size: 26px; min-width: 60px; text-align: center; }
    .score-blue { color: var(--color-blue); }
    .score-red { color: var(--color-red); }

    #status-container { text-align: center; }
    #status-msg { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: -4px; transition: color 0.3s; }
    #turn-indicator { font-size: 14px; font-weight: 700; color: #64748b; letter-spacing: 2px; }

    #game-board-wrapper {
      position: relative; width: 100%; max-height: calc(100vh - 120px);
      border-radius: 24px; overflow: hidden;
      border: 8px solid #1e293b;
      background: #14532d;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    
    .vertical-board { min-height: 70vh; }

    #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }

    #controls { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
    button {
      background: #1e293b; border: none;
      color: #fff; padding: 12px 24px; border-radius: 50px;
      font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase;
      box-shadow: 0 4px 0 #0f172a; transition: all 0.1s;
    }
    button:hover { transform: translateY(2px); box-shadow: 0 2px 0 #0f172a; }
    button:active { transform: translateY(4px); box-shadow: 0 0 0 #0f172a; }
    button.primary { background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; }

    #pass-toast {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #1e293b; color: #fff; padding: 15px 30px; border-radius: 50px;
      font-size: 20px; font-weight: 900; opacity: 0; transition: all 0.4s;
      z-index: 1000; border: 4px solid var(--color-blue); pointer-events: none;
    }

    #menu-overlay, #toss-overlay {
      position: absolute; inset: 0; background: rgba(255, 245, 242, 0.95);
      z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s;
    }
    
    #menu-card {
      background: #fff; border: 6px solid #1e293b;
      padding: 40px; border-radius: 32px; text-align: center; width: 90%; max-width: 400px;
      box-shadow: 0 20px 0 #1e293b;
    }
    #menu-card h1 { font-size: 40px; font-weight: 900; color: #1e293b; text-transform: uppercase; margin-bottom: 20px; }
    .menu-section { display: flex; flex-direction: column; gap: 12px; }
    .ai-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .hidden { opacity: 0 !important; pointer-events: none !important; }
    
    #toss-coin {
      width: 120px; height: 120px; background: #fbbf24; border: 8px solid #b45309; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #b45309;
      box-shadow: 0 10px 0 #b45309; margin: 0 auto 20px auto;
    }
    .flipping { animation: coinFlip 0.2s infinite alternate ease-in-out; }
    @keyframes coinFlip { 0% { transform: scaleY(1); } 100% { transform: scaleY(0.1); } }
    
    #toss-result-text { font-size: 32px; font-weight: 900; text-transform: uppercase; color: #1e293b; margin-top: 15px;}

    @media (max-width: 480px) {
      @keyframes impossibleGlow {
        0% { box-shadow: 0 0 5px rgba(255,0,0,0.5); }
        50% { box-shadow: 0 0 15px rgba(255,0,0,1); }
        100% { box-shadow: 0 0 5px rgba(255,0,0,0.5); }
      }
      .ai-impossible { animation: impossibleGlow 2s infinite; border-color: #ef4444 !important; }

      .ai-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
      .ai-btn { padding: 12px; border-radius: 50px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; background: #f1f5f9; color: #334155; }
      .ai-btn:active { transform: scale(0.95); }
      .ai-btn-impossible { background: #7f1d1d; color: #fca5a5; }

      @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.4); }
        100% { transform: scale(1); }
      }
      .score-pop { animation: pop 0.4s ease-out; }
      
      @keyframes shake {
        10%, 90% { transform: translate3d(-2px, 0, 0); }
        20%, 80% { transform: translate3d(4px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
        40%, 60% { transform: translate3d(8px, 0, 0); }
      }
      .shake-anim { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
      #status-msg { margin: 0; }

      .pill-value { font-size: 20px; padding: 8px 16px; }
      .pill-label { font-size: 14px; padding: 8px 12px; }
      #controls button { padding: 12px; font-size: 24px; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
      #btn-ready { width: auto !important; border-radius: 50px !important; font-size: 16px !important; padding: 12px 24px !important; }
    }

    .footer-credit {
      margin-top: 60px;
      margin-bottom: 20px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #94a3b8;
      text-transform: uppercase;
      text-align: center;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: default;
      display: flex;
      align-items: center;
      gap: 15px;
      opacity: 0.7;
    }
    .footer-credit::before, .footer-credit::after {
      content: '';
      height: 1px;
      width: 30px;
      background: linear-gradient(to right, transparent, #cbd5e1);
    }
    .footer-credit::after {
      background: linear-gradient(to left, transparent, #cbd5e1);
    }
    .footer-credit:hover {
      color: #1e293b;
      letter-spacing: 6px;
      opacity: 1;
      transform: translateY(-2px);
    }
    .footer-credit span {
      background: linear-gradient(45deg, #1e293b, #64748b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <div id="header">
      <div class="pill-score">
        <span class="pill-label">P1</span>
        <span class="pill-value score-blue" id="score-blue">0</span>
      </div>
      <div id="status-container">
        <div id="status-msg">P1'S TURN</div>
        <div id="turn-indicator">AIM & SHOOT</div>
      </div>
      <div class="pill-score">
        <span class="pill-label">P2/AI</span>
        <span class="pill-value score-red" id="score-red">0</span>
      </div>
    </div>

    <div id="game-board-wrapper">
      <div id="pass-toast">EXTRA TURN!</div>
      
      <div id="toss-overlay" class="hidden">
        <div style="text-align: center;">
          <div id="toss-coin">P1</div>
          <div id="toss-result-text">COIN TOSS</div>
        </div>
      </div>

      <div id="menu-overlay">
        <div id="menu-card">
          <h1>CARROM PRO</h1>
          <div class="menu-section">
            <button class="primary" style="width:100%; border-radius: 50px; font-size:14px;" onclick="startGame('pvp')">Local 2 Players</button>
            <div style="font-size: 12px; color: #64748b; font-weight: 900; margin-top: 15px;">AI DIFFICULTY</div>
            <div class="ai-buttons">
              <button class="ai-btn" onclick="startGame('pva', 'beginner')">Beginner</button>
              <button class="ai-btn" onclick="startGame('pva', 'medium')">Medium</button>
              <button class="ai-btn" onclick="startGame('pva', 'hard')">Hard</button>
              <button class="ai-btn ai-btn-impossible" onclick="startGame('pva', 'impossible')">💀 Impossible</button>
            </div>
            <hr style="border:0; border-top:4px solid #f1f5f9; margin: 20px 0;">
            <button onclick="toggleOrientation()" style="width:100%; border-radius: 50px; font-size:14px;">
              Switch to <span id="toggle-label">Vertical</span>
            </button>
          </div>
        </div>
      </div>
      <canvas id="game-canvas" style="touch-action: none;"></canvas>
    </div>

    <div id="controls">
      <button id="btn-ready" onclick="finishSetup()" style="display:none; background: #10b981; box-shadow: 0 4px 0 #059669;">READY</button>
      <button id="btn-menu" onclick="showMenu()">⚙️</button>
      <button id="btn-rotate" onclick="toggleOrientation()">🔄</button>
      <button id="btn-reset" onclick="resetGame()">🗑️</button>
    </div>

    <div class="footer-credit">
      <span>MADE BY SURAJ DAS</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('game-board-wrapper');
    const passToast = document.getElementById('pass-toast');
    const menuOverlay = document.getElementById('menu-overlay');
    const tossOverlay = document.getElementById('toss-overlay');
    const tossCoin = document.getElementById('toss-coin');
    const tossResultText = document.getElementById('toss-result-text');

    const FRICTION = 0.960; // Increased friction (2x drag)
    const RESTITUTION = 0.85;
    const MAX_POWER = 0.28; 
    const SPEED_SCALE = 0.04;

    let W, H, PR;
    let pieces = [];
    let ball = { x: 0, y: 0, vx: 0, vy: 0 };
    let scores = { blue: 0, red: 0 };
    let currentTeam = 'blue';
    let phase = 'idle'; 
    let selectedPiece = null;
    let mousePos = null;
    let lastHitBy = null;
    let ballHitByShooter = false;
    let passTriggeredThisShot = false;
    let passCount = 0;
    
    // AI & Advanced State
    let gameMode = 'pvp';
    let aiDifficulty = 'medium';
    let orientation = 'horizontal'; 
    let tossWinner = null;
    let reqFrameId = null;
    let goalkeeperClang = { blue: 0, red: 0 };
    
    let piecesPassedThisTurn = [];
    let counterAttackMode = false;
    let humanGoalsLast3 = [];
    
    // Debug Mode
    let aiDebugMode = false;
    let aiDebugState = { targetX: null, targetY: null, rayX1: null, rayY1: null, rayX2: null, rayY2: null, rayClear: false, state: '', score: 0 };
    let debugKeyBuffer = '';

    window.addEventListener('keydown', (e) => {
      debugKeyBuffer += e.key.toUpperCase();
      if (debugKeyBuffer.length > 5) debugKeyBuffer = debugKeyBuffer.substring(debugKeyBuffer.length - 5);
      if (debugKeyBuffer === 'DEBUG') { aiDebugMode = !aiDebugMode; debugKeyBuffer = ''; }
    });

    // --- AUDIO ENGINE (Synthetic) ---
    const AudioEngine = (() => {
      let ctx = null;
      function init() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      function play(freq, type, dur, vol) {
        init(); if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + dur);
      }
      return {
        clink: () => play(800 + Math.random()*400, 'sine', 0.1, 0.15),
        thud: () => play(150 + Math.random()*50, 'triangle', 0.2, 0.1),
        goal: () => {
          play(400, 'square', 0.5, 0.1);
          setTimeout(() => play(500, 'square', 0.5, 0.1), 100);
          setTimeout(() => play(600, 'square', 0.8, 0.15), 200);
        }
      };
    })();

    const isTouchDevice = navigator.maxTouchPoints > 0;
    if (isTouchDevice && window.innerWidth <= 480) {
      document.getElementById('btn-menu').textContent = '⚙️';
      document.getElementById('btn-rotate').textContent = '🔄';
      document.getElementById('btn-reset').textContent = '🗑️';
    } else {
      document.getElementById('btn-menu').textContent = 'MENU';
      document.getElementById('btn-rotate').textContent = 'ROTATE';
      document.getElementById('btn-reset').textContent = 'RESET';
    }

    function toggleOrientation() {
      orientation = orientation === 'horizontal' ? 'vertical' : 'horizontal';
      document.getElementById('toggle-label').textContent = orientation === 'horizontal' ? 'Vertical' : 'Horizontal';
      if (orientation === 'vertical') wrapper.classList.add('vertical-board');
      else wrapper.classList.remove('vertical-board');
      resize(); resetPositions();
    }

    function resize() {
      const rect = wrapper.getBoundingClientRect();
      const containerW = rect.width;
      const oldW = W || containerW, oldH = H || (containerW * 0.6);
      
      if (orientation === 'horizontal') {
        wrapper.style.paddingBottom = '60%'; W = containerW; H = containerW * 0.6;
      } else {
        wrapper.style.paddingBottom = '150%'; W = containerW; H = containerW * 1.5;
      }
      PR = window.devicePixelRatio || 1;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      canvas.width = W * PR; canvas.height = H * PR;
      ctx.setTransform(PR, 0, 0, PR, 0, 0);
      if (pieces.length === 0) { initGame(); return; }
      // Scale existing positions to new dimensions
      const sx = W / oldW, sy = H / oldH;
      pieces.forEach(p => { p.x *= sx; p.y *= sy; p.r = Math.min(W,H)*0.062; });
      if (ball) { ball.x *= sx; ball.y *= sy; ball.r = Math.min(W,H)*0.042; }
      draw();
    }

    function startGame(mode, difficulty) {
      gameMode = mode; if (difficulty) aiDifficulty = difficulty;
      menuOverlay.classList.add('hidden'); 
      scores = { blue: 0, red: 0 };
      runToss();
    }
    
    function resetGame() {
       scores = { blue: 0, red: 0 };
       runToss();
    }

    function runToss() {
      phase = 'toss';
      tossOverlay.classList.remove('hidden');
      tossCoin.classList.add('flipping');
      tossResultText.textContent = 'COIN TOSS...';
      
      let flipInterval = setInterval(() => {
        tossCoin.textContent = Math.random() > 0.5 ? 'P1' : (gameMode === 'pvp' ? 'P2' : 'AI');
      }, 100);

      setTimeout(() => {
        clearInterval(flipInterval);
        tossCoin.classList.remove('flipping');
        const winnerIsP1 = Math.random() > 0.5;
        tossWinner = winnerIsP1 ? 'blue' : 'red';
        tossCoin.textContent = winnerIsP1 ? 'P1' : (gameMode === 'pvp' ? 'P2' : 'AI');
        tossResultText.textContent = (winnerIsP1 ? 'P1' : (gameMode === 'pvp' ? 'P2' : 'AI')) + ' KICKS OFF';
        
        setTimeout(() => {
          tossOverlay.classList.add('hidden');
          currentTeam = tossWinner;
          resetPositions(true);
        }, 1000);
      }, 1500);
    }

    function showMenu() { menuOverlay.classList.remove('hidden'); }

    function initGame() { scores = { blue: 0, red: 0 }; resetPositions(true); }

    function resetPositions(doSetup = false) {
      if (reqFrameId) cancelAnimationFrame(reqFrameId);
      const pr = Math.min(W, H) * 0.062;
      pieces = [];
      if (orientation === 'horizontal') {
        const bPos = [{x:0.2,y:0.5},{x:0.25,y:0.28},{x:0.25,y:0.72},{x:0.12,y:0.35},{x:0.12,y:0.65}];
        bPos.forEach((p,i)=>pieces.push({x:W*p.x,y:H*p.y,vx:0,vy:0,r:pr,team:'blue',id:i}));
        const rPos = [{x:0.8,y:0.5},{x:0.75,y:0.28},{x:0.75,y:0.72},{x:0.88,y:0.35},{x:0.88,y:0.65}];
        rPos.forEach((p,i)=>pieces.push({x:W*p.x,y:H*p.y,vx:0,vy:0,r:pr,team:'red',id:i+5}));
      } else {
        const bPos = [{x:0.5,y:0.82},{x:0.28,y:0.75},{x:0.72,y:0.75},{x:0.35,y:0.88},{x:0.65,y:0.88}];
        bPos.forEach((p,i)=>pieces.push({x:W*p.x,y:H*p.y,vx:0,vy:0,r:pr,team:'blue',id:i}));
        const rPos = [{x:0.5,y:0.18},{x:0.28,y:0.25},{x:0.72,y:0.25},{x:0.35,y:0.12},{x:0.65,y:0.12}];
        rPos.forEach((p,i)=>pieces.push({x:W*p.x,y:H*p.y,vx:0,vy:0,r:pr,team:'red',id:i+5}));
      }
      ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, r: Math.min(W, H) * 0.042 };
      
      passCount = 0; shotArrows = [];
      
      if (doSetup) {
        phase = 'setup';
        document.getElementById('btn-ready').style.display = 'block';
        if (gameMode === 'pva') randomizeAIFormation();
      } else {
        phase = 'idle';
        document.getElementById('btn-ready').style.display = 'none';
        if (currentTeam === 'red' && gameMode === 'pva') setTimeout(aiTurn, 1000);
      }
      updateUI();
      draw();
    }

    function randomizeAIFormation() {
      pieces.filter(p => p.team === 'red').forEach(p => {
        if (orientation === 'horizontal') {
          p.x = W * (0.6 + Math.random() * 0.35);
          p.y = H * (0.1 + Math.random() * 0.8);
        } else {
          p.x = W * (0.1 + Math.random() * 0.8);
          p.y = H * (0.1 + Math.random() * 0.35);
        }
      });
    }

    function finishSetup() {
      if (gameMode === 'pvp' && currentTeam === 'blue') {
        currentTeam = 'red';
        updateUI();
        draw();
      } else {
        phase = 'idle';
        currentTeam = tossWinner || 'blue'; // Reset to toss winner after setup
        document.getElementById('btn-ready').style.display = 'none';
        updateUI();
        draw();
        if (currentTeam === 'red' && gameMode === 'pva') setTimeout(aiTurn, 1000);
      }
    }

    function updateUI() {
      document.getElementById('score-blue').textContent = scores.blue;
      document.getElementById('score-red').textContent = scores.red;
      const status = document.getElementById('status-msg');
      const indicator = document.getElementById('turn-indicator');
      
      let teamName = currentTeam === 'blue' ? "P1" : (gameMode === 'pvp' ? "P2" : "AI");
      status.textContent = phase === 'setup' ? teamName + "'S SETUP" : teamName + "'S TURN";
      if(phase !== 'setup' && currentTeam === 'red' && gameMode === 'pva') status.textContent = "AI THINKING...";
      
      status.style.color = currentTeam === 'blue' ? "var(--color-blue)" : "var(--color-red)";
      
      if (phase === 'setup') {
        indicator.textContent = "DRAG PIECES TO SET FORMATION";
      } else {
        indicator.textContent = phase === 'aiming' ? "READY TO SHOOT" : (passCount > 0 ? `COMBO PASS: ${passCount}` : "DRAG TO SHOOT");
      }
    }

    function showPass() {
      passToast.textContent = `PASS COMBO x${passCount}`;
      passToast.style.opacity = '1'; passToast.style.transform = 'translate(-50%, -60%)';
      setTimeout(() => { passToast.style.opacity = '0'; passToast.style.transform = 'translate(-50%, -50%)'; }, 1500);
    }

    function getMouse(e) {
      const rect = canvas.getBoundingClientRect();
      let cx = 0, cy = 0;
      if (e.changedTouches && e.changedTouches.length > 0) { cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY; }
      else if (e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
      else { cx = e.clientX || 0; cy = e.clientY || 0; }
      return { x: cx - rect.left, y: cy - rect.top };
    }

    function handleInputDown(e) {
      if (e.cancelable) e.preventDefault();
      if (phase !== 'idle' && phase !== 'setup' && phase !== 'aiming') return;
      if ((phase === 'idle' || phase === 'aiming') && gameMode === 'pva' && currentTeam === 'red') return;
      
      const m = getMouse(e);
      let closest = null, minD = Infinity;
      pieces.forEach(p => {
        if (phase === 'setup' && p.team !== currentTeam) return;
        if ((phase === 'idle' || phase === 'aiming') && p.team !== currentTeam) return;
        
        const d = Math.hypot(p.x - m.x, p.y - m.y);
        if (d < minD) { minD = d; closest = p; }
      });
      
      const hitRadius = closest ? closest.r * (isTouchDevice ? 5.5 : 3.5) : 0;
      
      if (closest && minD < hitRadius) {
        if (phase === 'aiming' && selectedPiece === closest) {
          selectedPiece = null;
          phase = 'idle';
          updateUI();
          draw();
          return;
        }
        if (navigator.vibrate) { try { navigator.vibrate(30); } catch(e){} }
        selectedPiece = closest; mousePos = m;
        if (phase !== 'setup') phase = 'aiming';
        updateUI();
        draw();
      } else {
        if (phase === 'aiming') {
          selectedPiece = null;
          phase = 'idle';
          updateUI();
          draw();
        }
      }
    }

    function handleInputMove(e) {
      if (e.cancelable) e.preventDefault();
      if (selectedPiece) {
        mousePos = getMouse(e);
        if (phase === 'setup') {
          selectedPiece.x = mousePos.x;
          selectedPiece.y = mousePos.y;
          if (orientation === 'horizontal') {
            if (selectedPiece.team === 'blue') {
              selectedPiece.x = Math.max(selectedPiece.r, Math.min(W/2 - selectedPiece.r, mousePos.x));
            } else {
              selectedPiece.x = Math.max(W/2 + selectedPiece.r, Math.min(W - selectedPiece.r, mousePos.x));
            }
            selectedPiece.y = Math.max(selectedPiece.r, Math.min(H - selectedPiece.r, mousePos.y));
          } else {
            if (selectedPiece.team === 'blue') {
              selectedPiece.y = Math.max(H/2 + selectedPiece.r, Math.min(H - selectedPiece.r, mousePos.y));
            } else {
              selectedPiece.y = Math.max(selectedPiece.r, Math.min(H/2 - selectedPiece.r, mousePos.y));
            }
            selectedPiece.x = Math.max(selectedPiece.r, Math.min(W - selectedPiece.r, mousePos.x));
          }
        }
        draw();
      }
    }

    function handleInputUp(e) {
      if (e.cancelable) e.preventDefault();
      if (selectedPiece) {
        if (phase === 'setup') {
          selectedPiece = null;
        } else if (phase === 'aiming') {
          const dx = selectedPiece.x - mousePos.x, dy = selectedPiece.y - mousePos.y, d = Math.hypot(dx, dy);
          const cancelRadius = selectedPiece.r * 2.5;
          if (d > cancelRadius) {
            executeShot(selectedPiece, dx, dy, d);
          } else {
            phase = 'idle'; draw();
          }
          selectedPiece = null; updateUI();
        }
      }
    }

    canvas.addEventListener('mousedown', handleInputDown);
    window.addEventListener('mousemove', handleInputMove);
    window.addEventListener('mouseup', handleInputUp);
    canvas.addEventListener('touchstart', handleInputDown, { passive: false });
    canvas.addEventListener('touchmove', handleInputMove, { passive: false });
    canvas.addEventListener('touchend', handleInputUp, { passive: false });

    function executeShot(p, dx, dy, d) {
      const maxDist = Math.min(W,H) * 0.6;
      const pow = Math.min(d, maxDist) / maxDist;
      const spd = pow * W * SPEED_SCALE;
      p.vx = (dx / d) * spd; p.vy = (dy / d) * spd;
      phase = 'animating'; lastHitBy = p.id; ballHitByShooter = false; passTriggeredThisShot = false;
      
      shotArrows.push({ x: p.x, y: p.y, dx: dx/d, dy: dy/d, time: Date.now() });
      
      if (reqFrameId) cancelAnimationFrame(reqFrameId);
      animate();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawField();
      drawGoals();
      drawPieces();
      drawBall();
      if (phase === 'aiming') drawAimLine();
      
      // Momentum arrows
      const now = Date.now();
      shotArrows = shotArrows.filter(a => now - a.time < 200);
      shotArrows.forEach(a => {
        const alpha = 1 - (now - a.time)/200;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = isTouchDevice ? 6 : 4;
        ctx.beginPath();
        ctx.moveTo(a.x + a.dx*20, a.y + a.dy*20);
        ctx.lineTo(a.x + a.dx*60, a.y + a.dy*60);
        ctx.stroke();
        ctx.restore();
      });
      if (shotArrows.length > 0) reqFrameId = requestAnimationFrame(draw);
    }

    function drawField() {
      ctx.save();
      const stripeCount = 10;
      const stripeW = orientation === 'horizontal' ? W / stripeCount : H / stripeCount;
      for (let i = 0; i < stripeCount; i++) {
        ctx.fillStyle = (i % 2 === 0) ? '#166534' : '#14532d';
        if (orientation === 'horizontal') ctx.fillRect(i * stripeW, 0, stripeW, H);
        else ctx.fillRect(0, i * stripeW, W, stripeW);
      }

      const baseLw = isTouchDevice ? 4.5 : 3;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = baseLw;
      ctx.strokeRect(5, 5, W-10, H-10);
      
      const cx = W/2, cy = H/2;
      ctx.beginPath();
      if (orientation === 'horizontal') { ctx.moveTo(cx, 5); ctx.lineTo(cx, H-5); }
      else { ctx.moveTo(5, cy); ctx.lineTo(W-5, cy); }
      ctx.stroke();

      ctx.beginPath(); ctx.arc(cx, cy, Math.min(W,H)*0.15, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    function drawGoals() {
      ctx.save();
      const g = getGoalMetrics();
      const baseLw = isTouchDevice ? 4.5 : 3;
      
      // Net Mesh Pattern (Realism)
      function drawNet(x, y, w, h) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
        const step = 8;
        for (let i = 0; i <= w; i += step) { ctx.beginPath(); ctx.moveTo(x+i, y); ctx.lineTo(x+i, y+h); ctx.stroke(); }
        for (let i = 0; i <= h; i += step) { ctx.beginPath(); ctx.moveTo(x, y+i); ctx.lineTo(x+w, y+i); ctx.stroke(); }
        ctx.restore();
      }

      // Goal Area Visuals
      if (orientation === 'horizontal') {
        drawNet(0, g.gy, g.gw, g.gh);
        drawNet(W-g.gw, g.gy, g.gw, g.gh);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = baseLw;
        ctx.strokeRect(0, g.gy, g.gw, g.gh); ctx.strokeRect(W-g.gw, g.gy, g.gw, g.gh);
      } else {
        drawNet(g.gx, 0, g.gw, g.gh);
        drawNet(g.gx, H-g.gh, g.gw, g.gh);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = baseLw;
        ctx.strokeRect(g.gx, 0, g.gw, g.gh); ctx.strokeRect(g.gx, H-g.gh, g.gw, g.gh);
      }
      
      // Goalkeeper bars
      g.gkBars.forEach((bar, index) => {
         const isBlueTeamGoal = orientation === 'horizontal' ? (index == 0) : (index == 0);
         ctx.fillStyle = '#fff';
         
         ctx.beginPath();
         ctx.roundRect(bar.x, bar.y, bar.w, bar.h, 4);
         ctx.fill();
         ctx.strokeStyle = '#1e293b'; ctx.lineWidth = baseLw; ctx.stroke();
         
         // Clang flash
         const clangVal = isBlueTeamGoal ? goalkeeperClang.blue : goalkeeperClang.red;
         if (clangVal > 0) {
             ctx.fillStyle = `rgba(255,255,255,${clangVal})`;
             ctx.beginPath(); ctx.roundRect(bar.x, bar.y, bar.w, bar.h, 4); ctx.fill();
             if (isBlueTeamGoal) goalkeeperClang.blue -= 0.05;
             else goalkeeperClang.red -= 0.05;
             if (goalkeeperClang.blue < 0) goalkeeperClang.blue = 0;
             if (goalkeeperClang.red < 0) goalkeeperClang.red = 0;
             reqFrameId = requestAnimationFrame(draw);
         }
      });

      // Pin Markers
      ctx.fillStyle = '#fff';
      g.bars.forEach(bar => {
        ctx.beginPath(); ctx.arc(bar.x, bar.y, 8, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2; ctx.stroke();
      });
      ctx.restore();

      // DEBUG OVERLAY (Hidden by default)
      if (aiDebugMode) {
        ctx.save();
        // 1. Predicted Ball (Yellow Dot)
        if (aiDebugState.targetX !== null) {
          ctx.beginPath(); ctx.arc(aiDebugState.targetX, aiDebugState.targetY, ball.r, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(253, 224, 71, 0.5)'; ctx.fill();
          ctx.strokeStyle = '#eab308'; ctx.lineWidth = 2; ctx.stroke();
        }
        // 2. Path Clear Ray (Green/Red Line)
        if (aiDebugState.rayX1 !== null) {
          ctx.beginPath(); ctx.moveTo(aiDebugState.rayX1, aiDebugState.rayY1); ctx.lineTo(aiDebugState.rayX2, aiDebugState.rayY2);
          ctx.strokeStyle = aiDebugState.rayClear ? 'rgba(34, 197, 94, 0.8)' : 'rgba(239, 68, 68, 0.8)';
          ctx.lineWidth = 3; ctx.setLineDash([5,5]); ctx.stroke();
        }
        // 3. AI State and Score
        ctx.fillStyle = '#fff'; ctx.font = '900 16px "Inter", sans-serif';
        ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
        const msg = `${aiDebugState.state} | Score: ${aiDebugState.score.toFixed(2)}`;
        ctx.fillText(msg, 10, 30);
        ctx.restore();
      }
    }

    function getGoalMetrics() {
      const gw = W*0.12, gh = H*0.55, edge = 5;
      const barThick = 10; 
      const goalLine = 15; // The line you must cross to score
      if (orientation === 'horizontal') {
        const gy = (H - gh)/2;
        const barH = gh * 0.35; 
        const barY = gy + (gh - barH)/2;
        return { 
            gw, gh, gy, goalLine,
            bars: [{x:gw,y:gy},{x:gw,y:gy+gh},{x:W-gw,y:gy},{x:W-gw,y:gy+gh}],
            gkBars: [
                {x:goalLine, y:barY, w:barThick, h:barH},
                {x:W-goalLine-barThick, y:barY, w:barThick, h:barH}
            ],
            dangerZones: [
                {x1:-100, x2:gw, y1:gy, y2:gy+gh},
                {x1:W-gw, x2:W+100, y1:gy, y2:gy+gh}
            ]
        };
      } else {
        const vgw = W*0.55, vgh = H*0.12, gx = (W - vgw)/2;
        const barW = vgw * 0.35; 
        const barX = gx + (vgw - barW)/2;
        const goalLine = 15;
        return { 
            gw:vgw, gh:vgh, gx, goalLine,
            bars: [{x:gx,y:vgh},{x:gx+vgw,y:vgh},{x:gx,y:H-vgh},{x:gx+vgw,y:H-vgh}],
            gkBars: [
                {x:barX, y:goalLine, w:barW, h:barThick},
                {x:barX, y:H-goalLine-barThick, w:barW, h:barThick}
            ],
            dangerZones: [
                {x1:gx, x2:gx+vgw, y1:-100, y2:vgh},
                {x1:gx, x2:gx+vgw, y1:H-vgh, y2:H+100}
            ]
        };
      }
    }

    function drawPieces() {
      ctx.save();
      const baseLw = isTouchDevice ? 5 : 3;
      pieces.forEach(p => {
        // Drop shadow
        ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 12; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 5;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        const baseCol = p.team === 'blue' ? [79,195,247] : [255,138,101];
        ctx.fillStyle = `rgb(${baseCol[0]},${baseCol[1]},${baseCol[2]})`;
        ctx.fill();
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        // 3D radial gradient overlay
        const grad = ctx.createRadialGradient(p.x - p.r*0.3, p.y - p.r*0.3, p.r*0.1, p.x, p.y, p.r);
        grad.addColorStop(0, `rgba(255,255,255,0.45)`);
        grad.addColorStop(0.6, `rgba(255,255,255,0.0)`);
        grad.addColorStop(1, `rgba(0,0,0,0.25)`);
        ctx.fillStyle = grad; ctx.fill();
        // Rim stroke
        ctx.strokeStyle = p.team === 'blue' ? '#1565c0' : '#c62828';
        ctx.lineWidth = baseLw; ctx.stroke();
        // Inner ring
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.55, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,255,255,0.3)`; ctx.lineWidth = 1.5; ctx.stroke();
        // Team emblem dot
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.18, 0, Math.PI*2);
        ctx.fillStyle = p.team === 'blue' ? '#0d47a1' : '#b71c1c'; ctx.fill();
        // Jersey stripes (Realism)
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(p.x - p.r*0.5, p.y); ctx.lineTo(p.x + p.r*0.5, p.y); ctx.stroke();
        
        // Impossible AI Glow
        if (aiDifficulty === 'impossible' && p.team === 'red') {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 3, 0, Math.PI*2);
          ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)'; ctx.lineWidth = 2; ctx.stroke();
        }
      });
      ctx.restore();
    }

    function drawBall() {
      ctx.save();
      // Motion blur for fast ball
      const speed = Math.hypot(ball.vx, ball.vy);
      if (speed > 8) {
        ctx.globalAlpha = 0.4;
        for (let i = 1; i <= 3; i++) {
            ctx.beginPath(); ctx.arc(ball.x - ball.vx*i*0.1, ball.y - ball.vy*i*0.1, ball.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
        }
      }
      ctx.globalAlpha = 1.0;
      // Shadow
      ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 10; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 4;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
      ctx.fillStyle = '#f5f5f5'; ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      // 3D gradient
      const bg = ctx.createRadialGradient(ball.x - ball.r*0.25, ball.y - ball.r*0.25, ball.r*0.05, ball.x, ball.y, ball.r);
      bg.addColorStop(0, 'rgba(255,255,255,0.9)');
      bg.addColorStop(0.5, 'rgba(255,255,255,0.0)');
      bg.addColorStop(1, 'rgba(0,0,0,0.2)');
      ctx.fillStyle = bg; ctx.fill();
      // Rim
      ctx.strokeStyle = '#9e9e9e'; ctx.lineWidth = 2; ctx.stroke();
      // Pentagon pattern
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      for(let i=0; i<5; i++){
        const ang = (i/5)*Math.PI*2 - Math.PI/2;
        ctx.beginPath(); ctx.arc(ball.x + Math.cos(ang)*ball.r*0.45, ball.y + Math.sin(ang)*ball.r*0.45, ball.r*0.2, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    function drawAimLine() {
      ctx.save();
      const dx = selectedPiece.x - mousePos.x, dy = selectedPiece.y - mousePos.y;
      const angle = Math.atan2(dy, dx), dist = Math.hypot(dx, dy);
      const maxDist = Math.min(W,H)*0.6;
      const power = Math.min(dist, maxDist) / maxDist;
      const cancelRadius = selectedPiece.r * 2.5;
      // Cancel Zone
      ctx.beginPath(); ctx.arc(selectedPiece.x, selectedPiece.y, cancelRadius, 0, Math.PI*2);
      ctx.fillStyle = dist < cancelRadius ? 'rgba(239,68,68,0.35)' : 'rgba(255,255,255,0.08)';
      ctx.fill();
      ctx.strokeStyle = dist < cancelRadius ? '#ef4444' : 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 2; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
      if (dist >= cancelRadius) {
        let lineColor = '#22c55e';
        if (power > 0.8) lineColor = '#ef4444';
        else if (power > 0.4) lineColor = '#facc15';
        // Power arc
        ctx.beginPath();
        ctx.arc(selectedPiece.x, selectedPiece.y, selectedPiece.r*1.6, angle-Math.PI, angle-Math.PI+(Math.PI*2*power));
        ctx.strokeStyle = lineColor; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
        // Bank-shot trajectory prediction
        const predLen = power * Math.min(W,H) * 0.45;
        const dirX = Math.cos(angle), dirY = Math.sin(angle);
        let cx = selectedPiece.x, cy = selectedPiece.y, rdx = dirX, rdy = dirY, traveled = 0;
        const edge = 5, dotGap = 12, dotR = isTouchDevice ? 4 : 3;
        let bounced = false;
        // Draw dotted trajectory with bounce
        for (let step = 0; step < 40 && traveled < predLen; step++) {
          const nx = cx + rdx * dotGap, ny = cy + rdy * dotGap;
          // Check wall bounce
          if (nx - edge < 0) { rdx = -rdx; bounced = true; }
          else if (nx + edge > W) { rdx = -rdx; bounced = true; }
          if (ny - edge < 0) { rdy = -rdy; bounced = true; }
          else if (ny + edge > H) { rdy = -rdy; bounced = true; }
          cx += rdx * dotGap; cy += rdy * dotGap;
          traveled += dotGap;
          const alpha = 1 - (traveled / predLen) * 0.7;
          ctx.beginPath(); ctx.arc(cx, cy, dotR, 0, Math.PI*2);
          ctx.fillStyle = bounced ? `rgba(255,255,255,${alpha*0.5})` : `rgba(255,255,255,${alpha})`;
          ctx.fill();
        }
        // Endpoint marker
        ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2);
        ctx.fillStyle = lineColor; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      }
      ctx.restore();
    }

    function animate() {
      let moving = false;
      const all = [...pieces, ball];
      const g = getGoalMetrics();
      const SUB_STEPS = 4;
      const subFriction = Math.pow(FRICTION, 1/SUB_STEPS);
      
      for (let s = 0; s < SUB_STEPS; s++) {
        all.forEach(o => {
          o.x += o.vx / SUB_STEPS; o.y += o.vy / SUB_STEPS;
          o.vx *= subFriction; o.vy *= subFriction;
          const edge = 5, isBall = o === ball;
          
          // Soft repulsive field in goal mouth for pieces (both goals)
          if (!isBall) {
             g.dangerZones.forEach(dz => {
                 if (o.x > dz.x1 && o.x < dz.x2 && o.y > dz.y1 && o.y < dz.y2) {
                     // Calculate center of goal mouth to push AWAY from it
                     const force = 0.8;
                     if (orientation === 'horizontal') {
                         if (dz.x1 < 0) o.vx += force; else o.vx -= force;
                     } else {
                         if (dz.y1 < 0) o.vy += force; else o.vy -= force;
                     }
                 }
             });
          }
          
          if (orientation === 'horizontal') {
            if (o.x-o.r < edge) { if (!isBall || !(o.y > g.gy && o.y < g.gy+g.gh)) { o.x = edge+o.r; o.vx *= -RESTITUTION; } }
            if (o.x+o.r > W-edge) { if (!isBall || !(o.y > g.gy && o.y < g.gy+g.gh)) { o.x = W-edge-o.r; o.vx *= -RESTITUTION; } }
            if (o.y-o.r < edge) { o.y = edge+o.r; o.vy *= -RESTITUTION; }
            if (o.y+o.r > H-edge) { o.y = H-edge-o.r; o.vy *= -RESTITUTION; }
          } else {
            if (o.y-o.r < edge) { if (!isBall || !(o.x > g.gx && o.x < g.gx+g.gw)) { o.y = edge+o.r; o.vy *= -RESTITUTION; } }
            if (o.y+o.r > H-edge) { if (!isBall || !(o.x > g.gx && o.x < g.gx+g.gw)) { o.y = H-edge-o.r; o.vy *= -RESTITUTION; } }
            if (o.x-o.r < edge) { o.x = edge+o.r; o.vx *= -RESTITUTION; }
            if (o.x+o.r > W-edge) { o.x = W-edge-o.r; o.vx *= -RESTITUTION; }
          }
        });
        checkCollisions();
      }
      
      all.forEach(o => {
        if (Math.abs(o.vx) < 0.1) o.vx = 0; if (Math.abs(o.vy) < 0.1) o.vy = 0;
        if (o.vx !== 0 || o.vy !== 0) moving = true;
      });
      
      if (checkGoal()) return; draw();
      if (moving) { reqFrameId = requestAnimationFrame(animate); } else endTurn();
    }

    function checkCollisions() {
      const all = [...pieces, ball];
      const g = getGoalMetrics();
      
      // Pin markers collision
      all.forEach(o => {
        g.bars.forEach(b => {
          const d = Math.hypot(o.x - b.x, o.y - b.y);
          if (d < o.r + 6) {
            const nx = (o.x - b.x)/d, ny = (o.y - b.y)/d;
            o.x = b.x + nx*(o.r + 6.5); o.y = b.y + ny*(o.r + 6.5);
            const dot = o.vx*nx + o.vy*ny;
            if (dot < 0) { o.vx -= 2*dot*nx*RESTITUTION; o.vy -= 2*dot*ny*RESTITUTION; }
          }
        });
      });
      
      // Goalkeeper Bar collision (blocks ALL objects)
      g.gkBars.forEach((bar, index) => {
        all.forEach(o => {
         let testX = o.x, testY = o.y;
         if (o.x < bar.x) testX = bar.x; else if (o.x > bar.x + bar.w) testX = bar.x + bar.w;
         if (o.y < bar.y) testY = bar.y; else if (o.y > bar.y + bar.h) testY = bar.y + bar.h;
         let distX = o.x - testX, distY = o.y - testY;
         let distance = Math.hypot(distX, distY);
         if (distance <= o.r && distance > 0) {
             if (o === ball) { if (index === 0) goalkeeperClang.blue = 1.0; else goalkeeperClang.red = 1.0; }
             const nx = distX/distance, ny = distY/distance;
             const dot = o.vx*nx + o.vy*ny;
             if (dot < 0) { 
               o.vx -= 2*dot*nx*RESTITUTION; o.vy -= 2*dot*ny*RESTITUTION; 
               AudioEngine.thud();
             }
             o.x = testX + nx*(o.r+1); o.y = testY + ny*(o.r+1);
         }
        });
      });

      for (let i = 0; i < all.length; i++) {
        for (let j = i + 1; j < all.length; j++) {
          const a = all[i], b = all[j];
          const d = Math.hypot(a.x - b.x, a.y - b.y), minD = a.r + b.r;
          if (d < minD && d > 0) {
            const nx = (b.x - a.x)/d, ny = (b.y - a.y)/d, overlap = (minD - d)/2;
            a.x -= nx*overlap; a.y -= ny*overlap; b.x += nx*overlap; b.y += ny*overlap;
             const relVx = b.vx - a.vx, relVy = b.vy - a.vy;
             const speed = relVx*nx + relVy*ny;
             if (speed < 0) {
                 const impulse = (2 * speed) / (1 + 1);
                 a.vx += impulse * nx * RESTITUTION; a.vy += impulse * ny * RESTITUTION;
                 b.vx -= impulse * nx * RESTITUTION; b.vy -= impulse * ny * RESTITUTION;
                 if (Math.hypot(a.vx, a.vy) > 1 || Math.hypot(b.vx, b.vy) > 1) AudioEngine.clink();
             }
             if (phase === 'animating') {
              const shooter = pieces.find(p => p.id === lastHitBy);
              if ((a === shooter && b === ball) || (b === shooter && a === ball)) ballHitByShooter = true;
              if (ballHitByShooter && !passTriggeredThisShot && passCount < 5) {
                const receiver = (a === ball)?b:(b === ball?a:null);
                if (receiver && pieces.includes(receiver) && receiver.team === currentTeam && receiver.id !== lastHitBy) {
                  passTriggeredThisShot = true; passCount++;
                  repositionPasserNearGoal(shooter); showPass();
                }
              }
            }
          }
        }
      }
    }

    function repositionPasserNearGoal(passer) {
      // No teleportation — just give the passer a nudge toward the ball
      const dx = ball.x - passer.x, dy = ball.y - passer.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) {
        const nudge = 2.5;
        passer.vx += (dx/dist) * nudge;
        passer.vy += (dy/dist) * nudge;
      }
    }

    function checkGoal() {
      const g = getGoalMetrics();
      // Goal detection: must pass BEHIND the bar (goalLine)
      if (orientation === 'horizontal') {
        if (ball.x < g.goalLine && ball.y > g.gy && ball.y < g.gy+g.gh) { 
            scores.red++; currentTeam = 'blue'; celebrate('RED SCORES!', 'BLUE KICKS OFF'); return true; 
        }
        if (ball.x > W - g.goalLine && ball.y > g.gy && ball.y < g.gy+g.gh) { 
            scores.blue++; currentTeam = 'red'; celebrate('BLUE SCORES!', 'RED KICKS OFF'); return true; 
        }
      } else {
        if (ball.y < g.goalLine && ball.x > g.gx && ball.x < g.gx+g.gw) { 
            scores.blue++; currentTeam = 'red'; celebrate('BLUE SCORES!', 'RED KICKS OFF'); return true; 
        }
        if (ball.y > H - g.goalLine && ball.x > g.gx && ball.x < g.gx+g.gw) { 
            scores.red++; currentTeam = 'blue'; celebrate('RED SCORES!', 'BLUE KICKS OFF'); return true; 
        }
      }
      // Foul: check if any piece entered opponent's goal
      pieces.forEach(p => {
        if (orientation === 'horizontal') {
          if (p.x < 5) { p.x = W*0.3; p.y = H/2; p.vx = 0; p.vy = 0; }
          if (p.x > W-5) { p.x = W*0.7; p.y = H/2; p.vx = 0; p.vy = 0; }
        } else {
          if (p.y < 5) { p.x = W/2; p.y = H*0.3; p.vx = 0; p.vy = 0; }
          if (p.y > H-5) { p.x = W/2; p.y = H*0.7; p.vx = 0; p.vy = 0; }
        }
      });
      return false;
    }

    function celebrate(msg, nextMsg) { 
        AudioEngine.goal();
        if (navigator.vibrate) { try { navigator.vibrate([100,50,100]); } catch(e){} }
        document.getElementById('status-msg').textContent = msg; 
        document.getElementById('turn-indicator').textContent = nextMsg;
        
        if (msg.includes('BLUE SCORES')) {
          humanGoalsLast3.push(1);
          counterAttackMode = true;
        } else {
          humanGoalsLast3.push(0);
        }
        if (humanGoalsLast3.length > 3) humanGoalsLast3.shift();
        
        // Scoreboard Pop
        const scoreEl = msg.includes('BLUE') ? document.getElementById('score-blue') : document.getElementById('score-red');
        scoreEl.classList.remove('score-pop');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('score-pop');

        // Visual "Juice": Screen shake
        const wrapper = document.getElementById('game-board-wrapper');
        wrapper.classList.remove('shake-anim');
        void wrapper.offsetWidth; // trigger reflow
        wrapper.classList.add('shake-anim');

        setTimeout(() => { resetPositions(); draw(); }, 1500); 
    }

    function endTurn() {
      if (passTriggeredThisShot) {
        phase = 'idle'; ballHitByShooter = false; passTriggeredThisShot = false;
        if (currentTeam === 'red' && gameMode === 'pva') setTimeout(aiTurn, 600); // Pass chain delay
      } else {
        currentTeam = currentTeam === 'blue' ? 'red' : 'blue';
        phase = 'idle'; ballHitByShooter = false; passTriggeredThisShot = false;
        passCount = 0; piecesPassedThisTurn = [];
        if (currentTeam === 'red' && gameMode === 'pva') setTimeout(aiTurn, 1000);
      }
      updateUI();
    }

    // --- CORE MATH HELPERS ---
    function angleBetween(x1, y1, x2, y2) { return Math.atan2(y2-y1, x2-x1); }
    
    function predictBall(steps) {
      let sim = { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy, r: ball.r };
      for (let i=0; i<Math.min(steps, 200); i++) {
        sim.x += sim.vx; sim.y += sim.vy;
        sim.vx *= FRICTION; sim.vy *= FRICTION;
        if (sim.x - sim.r < 0) { sim.x = sim.r; sim.vx = Math.abs(sim.vx); }
        if (sim.x + sim.r > W) { sim.x = W - sim.r; sim.vx = -Math.abs(sim.vx); }
        if (sim.y - sim.r < 0) { sim.y = sim.r; sim.vy = Math.abs(sim.vy); }
        if (sim.y + sim.r > H) { sim.y = H - sim.r; sim.vy = -Math.abs(sim.vy); }
      }
      return {x: sim.x, y: sim.y};
    }
    
    function isPathClear(x1, y1, x2, y2, excludeIds=[]) {
      const dx = x2-x1, dy = y2-y1, segLen = Math.hypot(dx, dy);
      if (segLen < 1) return true;
      for (const p of pieces) {
        if (excludeIds.includes(p.id)) continue;
        const tx = p.x-x1, ty = p.y-y1;
        const proj = (tx*dx + ty*dy) / segLen;
        if (proj < 0 || proj > segLen) continue; // Past ends of segment
        const dist = Math.abs((y2-y1)*p.x - (x2-x1)*p.y + x2*y1 - y2*x1) / segLen;
        if (dist < p.r + 2) return false;
      }
      return true;
    }
    
    function goalCorners() {
      const g = getGoalMetrics();
      if (orientation === 'horizontal') {
        return [ {x:g.goalLine, y:g.gy+10}, {x:g.goalLine, y:g.gy+g.gh-10}, {x:W-g.goalLine, y:g.gy+10}, {x:W-g.goalLine, y:g.gy+g.gh-10} ];
      } else {
        return [ {x:g.gx+10, y:g.goalLine}, {x:g.gx+g.gw-10, y:g.goalLine}, {x:g.gx+10, y:H-g.goalLine}, {x:g.gx+g.gw-10, y:H-g.goalLine} ];
      }
    }
    
    function shotScore(piece, targetBall, goalTarget) {
      const distScore = Math.max(0, 1 - (Math.hypot(piece.x - targetBall.x, piece.y - targetBall.y) / (Math.min(W,H)*0.8)));
      let angleDiff = angleBetween(targetBall.x, targetBall.y, goalTarget.x, goalTarget.y) - angleBetween(piece.x, piece.y, targetBall.x, targetBall.y);
      angleDiff = Math.abs((angleDiff + Math.PI) % (2 * Math.PI) - Math.PI);
      const angleScore = Math.max(0, 1 - (angleDiff / Math.PI));
      const clearScore = isPathClear(piece.x, piece.y, targetBall.x, targetBall.y, [piece.id]) ? 1 : 0.1;
      return distScore*0.3 + angleScore*0.4 + clearScore*0.3;
    }
    
    function computeHitPoint(piece, targetBall, goalTarget) {
      const nx = goalTarget.x - targetBall.x, ny = goalTarget.y - targetBall.y;
      const dist = Math.hypot(nx,ny);
      if (dist === 0) return {x: targetBall.x, y: targetBall.y};
      return { x: targetBall.x - (nx/dist)*(targetBall.r + piece.r), y: targetBall.y - (ny/dist)*(targetBall.r + piece.r) };
    }
    
    function bankTarget(fromX, fromY, toX, toY) {
      let bestPt = null, bestClear = -1;
      const walls = [
        {reflX: fromX, reflY: -toY, isY: true, wallVal: 0}, 
        {reflX: fromX, reflY: 2*H - toY, isY: true, wallVal: H}, 
        {reflX: -toX, reflY: fromY, isY: false, wallVal: 0}, 
        {reflX: 2*W - toX, reflY: fromY, isY: false, wallVal: W} 
      ];
      for (const w of walls) {
        let ix, iy;
        if (w.isY) {
          if (w.reflY - fromY === 0) continue;
          const t = (w.wallVal - fromY) / (w.reflY - fromY);
          ix = fromX + t * (w.reflX - fromX); iy = w.wallVal;
          if (ix < 0 || ix > W) continue;
        } else {
          if (w.reflX - fromX === 0) continue;
          const t = (w.wallVal - fromX) / (w.reflX - fromX);
          ix = w.wallVal; iy = fromY + t * (w.reflY - fromY);
          if (iy < 0 || iy > H) continue;
        }
        const clear1 = isPathClear(fromX, fromY, ix, iy, []);
        const clear2 = isPathClear(ix, iy, toX, toY, []);
        const score = (clear1?1:0) + (clear2?1:0);
        if (score > bestClear) { bestClear = score; bestPt = {x:ix, y:iy}; }
      }
      return bestPt || {x: toX, y: toY};
    }

    // --- AI ALGORITHM REWRITE ---
    function aiTurn() {
      if (phase !== 'idle' || currentTeam !== 'red') return;
      const my = pieces.filter(p => p.team === 'red');
      if (my.length === 0) return;

      const corners = goalCorners();
      // Red attacks Left (x=0) or Bottom (y=H)
      const opGoals = orientation === 'horizontal' ? [corners[0], corners[1]] : [corners[2], corners[3]];
      
      let bestPiece = my[0], targetPoint = {x: ball.x, y: ball.y}, power = 0.5, noise = 0, delay = 1000;
      let stateLabel = 'SHOOT'; let finalScore = 0;
      
      // Execute the computed shot
      function doShot() {
        const dx = targetPoint.x - bestPiece.x, dy = targetPoint.y - bestPiece.y;
        let angle = Math.atan2(dy, dx) + (Math.random() * noise * 2 - noise);
        
        // Pass system usage
        piecesPassedThisTurn.push(bestPiece.id);
        lastHitBy = bestPiece.id;
        
        const finalSpeed = power * MAX_POWER * (Math.min(W,H) / 800) * 800 * SPEED_SCALE;
        bestPiece.vx = Math.cos(angle) * finalSpeed;
        bestPiece.vy = Math.sin(angle) * finalSpeed;
        
        aiDebugState.rayX1 = bestPiece.x; aiDebugState.rayY1 = bestPiece.y;
        aiDebugState.rayX2 = targetPoint.x; aiDebugState.rayY2 = targetPoint.y;
        aiDebugState.rayClear = isPathClear(bestPiece.x, bestPiece.y, targetPoint.x, targetPoint.y, [bestPiece.id]);
        aiDebugState.state = stateLabel; aiDebugState.score = finalScore;
        
        phase = 'animating';
        reqFrameId = requestAnimationFrame(animate);
      }

      if (aiDifficulty === 'beginner') {
        // BEGINNER
        const predictedBall = predictBall(0);
        aiDebugState.targetX = predictedBall.x; aiDebugState.targetY = predictedBall.y;
        bestPiece = my.reduce((best, p) => Math.hypot(p.x - ball.x, p.y - ball.y) < Math.hypot(best.x - ball.x, best.y - ball.y) ? p : best, my[0]);
        if (Math.random() < 0.3) bestPiece = my[Math.floor(Math.random() * my.length)];
        const goalCenter = orientation === 'horizontal' ? {x: 0, y: H/2} : {x: W/2, y: H};
        targetPoint = computeHitPoint(bestPiece, predictedBall, goalCenter);
        noise = 0.35; power = 0.45 + Math.random() * 0.2; delay = 1400; stateLabel = 'BEGINNER SHOOT';
        setTimeout(doShot, delay);
        return;
      }

      if (aiDifficulty === 'medium') {
        // MEDIUM
        const predictedBall = predictBall(5);
        aiDebugState.targetX = predictedBall.x; aiDebugState.targetY = predictedBall.y;
        let bestScore = -1;
        my.forEach(p => {
            const goalCorner = Math.hypot(p.x - opGoals[0].x, p.y - opGoals[0].y) < Math.hypot(p.x - opGoals[1].x, p.y - opGoals[1].y) ? opGoals[0] : opGoals[1];
            const score = shotScore(p, predictedBall, goalCorner);
            if (score > bestScore) { bestScore = score; bestPiece = p; targetPoint = computeHitPoint(p, predictedBall, goalCorner); finalScore = score; }
        });
        if (Math.random() < 0.1 && my.length > 1) bestPiece = my[Math.floor(Math.random() * my.length)]; // Distraction
        
        // Basic Defense
        if ((orientation === 'horizontal' && ball.x > W*0.6) || (orientation === 'vertical' && ball.y < H*0.4)) { // Own half (Red is Right/Top)
            targetPoint = computeHitPoint(bestPiece, predictedBall, {x: orientation==='horizontal'?0:W/2, y: orientation==='horizontal'?H/2:H});
            power = 0.8; stateLabel = 'DEFEND (MED)';
        } else {
            power = 0.65 + Math.random() * 0.2; stateLabel = 'SHOOT (MED)';
        }
        noise = 0.12; delay = 900;
        setTimeout(doShot, delay);
        return;
      }

      if (aiDifficulty === 'hard') {
        // HARD
        const predictedBall = predictBall(10);
        aiDebugState.targetX = predictedBall.x; aiDebugState.targetY = predictedBall.y;
        
        // Danger Intercept
        const pred8 = predictBall(8);
        if ((orientation === 'horizontal' && pred8.x > W*0.8) || (orientation === 'vertical' && pred8.y < H*0.2)) {
            bestPiece = my.reduce((best, p) => Math.hypot(p.x - pred8.x, p.y - pred8.y) < Math.hypot(best.x - pred8.x, best.y - pred8.y) ? p : best, my[0]);
            targetPoint = {x: pred8.x, y: pred8.y};
            power = 1.0; noise = 0.04; delay = 0; stateLabel = 'INTERCEPT (HARD)';
            setTimeout(doShot, delay); return;
        }

        // Full Defense
        if ((orientation === 'horizontal' && ball.x > W*0.65) || (orientation === 'vertical' && ball.y < H*0.35)) {
            bestPiece = my.reduce((best, p) => Math.hypot(p.x - predictedBall.x, p.y - predictedBall.y) < Math.hypot(best.x - predictedBall.x, best.y - predictedBall.y) ? p : best, my[0]);
            targetPoint = computeHitPoint(bestPiece, predictedBall, {x: orientation==='horizontal'?0:W/2, y: orientation==='horizontal'?H/2:H});
            power = 1.0; noise = 0.04; delay = 450; stateLabel = 'DEFEND (HARD)';
            setTimeout(doShot, delay); return;
        }

        let bestScore = -1;
        my.forEach(p => {
            const farCorner = Math.hypot(ball.x - opGoals[0].x, ball.y - opGoals[0].y) > Math.hypot(ball.x - opGoals[1].x, ball.y - opGoals[1].y) ? opGoals[0] : opGoals[1];
            let score = shotScore(p, predictedBall, farCorner);
            let hitPt = computeHitPoint(p, predictedBall, farCorner);
            if (!isPathClear(p.x, p.y, hitPt.x, hitPt.y, [p.id])) {
                const bTarget = bankTarget(p.x, p.y, hitPt.x, hitPt.y);
                const bScore = shotScore(p, {x: bTarget.x, y: bTarget.y, r: ball.r}, farCorner); // Approximate score for bank
                if (bScore > score) { score = bScore; hitPt = bTarget; }
            }
            if (score > bestScore) { bestScore = score; bestPiece = p; targetPoint = hitPt; finalScore = score; }
        });

        power = 0.82 + Math.random() * 0.13; noise = 0.04; delay = 450; stateLabel = 'SHOOT (HARD)';
        setTimeout(doShot, delay); return;
      }

      if (aiDifficulty === 'impossible') {
        // IMPOSSIBLE
        const predictedBall = predictBall(15);
        aiDebugState.targetX = predictedBall.x; aiDebugState.targetY = predictedBall.y;

        // Counter Attack
        if (counterAttackMode) {
            bestPiece = my.reduce((best, p) => (orientation==='horizontal'?p.x<best.x:p.y>best.y) ? p : best, my[0]);
            const farCorner = Math.hypot(ball.x - opGoals[0].x, ball.y - opGoals[0].y) > Math.hypot(ball.x - opGoals[1].x, ball.y - opGoals[1].y) ? opGoals[0] : opGoals[1];
            targetPoint = computeHitPoint(bestPiece, predictedBall, farCorner);
            power = 1.0; noise = 0.018; delay = 80; stateLabel = 'COUNTER ATTACK';
            counterAttackMode = false;
            setTimeout(doShot, delay); return;
        }

        // Prediction Intercept
        const pred12 = predictBall(12);
        if ((orientation === 'horizontal' && pred12.x > W*0.85) || (orientation === 'vertical' && pred12.y < H*0.15)) {
            bestPiece = my.reduce((best, p) => Math.hypot(p.x - pred12.x, p.y - pred12.y) < Math.hypot(best.x - pred12.x, best.y - pred12.y) ? p : best, my[0]);
            targetPoint = {x: pred12.x, y: pred12.y};
            power = 1.0; noise = 0.018; delay = 180; stateLabel = 'INTERCEPT (IMP)';
            setTimeout(doShot, delay); return;
        }

        // Adaptive Difficulty
        noise = 0.018;
        const hGoals = humanGoalsLast3.reduce((a,b)=>a+b,0);
        if (hGoals >= 2) noise = 0.008; // Losing? Get accurate.
        if (scores.red - scores.blue >= 3) noise = 0.03; // Winning big? Get sloppy.

        const farCorner = Math.hypot(ball.x - opGoals[0].x, ball.y - opGoals[0].y) > Math.hypot(ball.x - opGoals[1].x, ball.y - opGoals[1].y) ? opGoals[0] : opGoals[1];
        
        let bestDirectScore = -1, bestDirectHitPt = null, bestDirectPiece = null;
        my.forEach(p => {
            if (piecesPassedThisTurn.includes(p.id)) return;
            let score = shotScore(p, predictedBall, farCorner);
            let hitPt = computeHitPoint(p, predictedBall, farCorner);
            if (!isPathClear(p.x, p.y, hitPt.x, hitPt.y, [p.id])) {
                const bTarget = bankTarget(p.x, p.y, hitPt.x, hitPt.y);
                const bScore = shotScore(p, {x: bTarget.x, y: bTarget.y, r: ball.r}, farCorner);
                if (bScore > score) { score = bScore; hitPt = bTarget; }
            }
            if (score > bestDirectScore) { bestDirectScore = score; bestDirectPiece = p; bestDirectHitPt = hitPt; }
        });

        // Passing Evaluation
        let bestPassScore = -1, passPasser = null, passReceiver = null;
        if (passCount < 3) {
            my.forEach(A => {
                if (piecesPassedThisTurn.includes(A.id)) return;
                my.forEach(B => {
                    if (A === B || piecesPassedThisTurn.includes(B.id)) return;
                    if (isPathClear(A.x, A.y, B.x, B.y, [A.id, B.id])) {
                        const B_shotScore = shotScore(B, predictedBall, farCorner);
                        const A_directScore = shotScore(A, predictedBall, farCorner);
                        if (B_shotScore > A_directScore + 0.18 && B_shotScore > bestPassScore) {
                            bestPassScore = B_shotScore; passPasser = A; passReceiver = B;
                        }
                    }
                });
            });
        }

        if (bestPassScore > bestDirectScore && passPasser && passReceiver) {
            bestPiece = passPasser;
            targetPoint = computeHitPoint(passPasser, passReceiver, passReceiver); // Aim at B
            power = 0.6; delay = 350; stateLabel = 'PASS (IMP)'; finalScore = bestPassScore;
            setTimeout(doShot, delay); return;
        }

        // Direct / Bank 
        if (bestDirectPiece) {
            bestPiece = bestDirectPiece; targetPoint = bestDirectHitPt; finalScore = bestDirectScore;
        } else {
            bestPiece = my[0]; targetPoint = {x: ball.x, y: ball.y}; // Ultimate fallback
        }
        power = 0.9 + Math.random() * 0.1; delay = 180; stateLabel = 'SHOOT (IMP)';
        setTimeout(doShot, delay); return;
      }
    }
